<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXEL | Enlaces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --texel-purple: #7e3bed;
            --texel-green: #8eff01;
            --border-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            margin: 0;
            
            /* Usando una imagen como fondo */
            background-image: url('tarjeta.png'); /* Reemplaza esto con tu URL */
            background-size: cover; /* Hace que la imagen cubra toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-attachment: fixed; /* Evita que la imagen se mueva al hacer scroll */
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeIn 0.8s ease-out;
            /* Fondo de cristal para dejar traslucir las luces suavemente */
            background-color: rgba(10, 10, 10, 0.3);
            padding: 2.5rem 2rem;
            border: 2px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-radius: 4px;
        }

        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            background-color: var(--texel-purple);
            color: #ffffff;
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 700;
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
        }
        
        .logo-container:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 700;
            color: var(--texel-green);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .description {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #dddddd;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background-color: var(--texel-green);
            color: #000000;
            border-color: var(--texel-green);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(142, 255, 1, 0.3);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-icon {
            color: #ffffff;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .social-icon:hover {
            background-color: var(--texel-purple);
            border-color: var(--texel-purple);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(126, 59, 237, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

        <header class="header">
            <div class="logo-container">T</div>
            <div>
                <h1 class="brand-name">TEXEL 🦖</h1>
                <p class="subtitle">Corte Láser & Diseño</p>
                <p class="description">
                    Materializamos el futuro de tu marca ⚡
                </p>
            </div>
        </header>
