<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXEL | Enlaces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --texel-purple: #7e3bed;
            --texel-green: #8eff01;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            
            /* Degradado HD disperso */
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(142, 255, 1, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 85% 85%, rgba(126, 59, 237, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 60% 0%, rgba(142, 255, 1, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 40px; /* Bordes muy redondos premium */
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .header { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

        .logo-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        .brand-name { font-size: 1.8rem; font-weight: 700; letter-spacing: -1px; text-transform: uppercase; }
        .subtitle { font-size: 0.85rem; color: var(--texel-green); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.5rem; }
        .description { font-size: 0.95rem; color: #b0b0b0; line-height: 1.6; padding: 0 1rem; }

        .links-container { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            padding: 1.1rem;
            border-radius: 50px; /* Estilo píldora */
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: var(--texel-purple);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(126, 59, 237, 0.3);
        }

        .social-icons { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
        .social-icon {
            color: #fff;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-icon:hover { background: var(--texel-green); color: #000; transform: scale(1.1); }
        .social-icon svg { width: 22px; height: 22px; fill: currentColor; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img src="logo.png" alt="Perfil" class="logo-img" onerror="this.style.display='none'; document.querySelector('.logo-container').innerHTML='T'">
            </div>
            <div>
                <h1 class="brand-name">TEXEL</h1>
                <p class="subtitle">Corte Láser & Diseño</p>
                <p class="description">Materializamos el futuro de tu marca ⚡</p>
            </div>
        </header>

        <main class="links-container">
            <a href="#" class="link-btn">Ver Portafolio</a>
            <a href="#" class="link-btn">Nuestros Servicios</a>
            <a href="#" class="link-btn">Agenda una Asesoría</a>
        </main>

    </div>

</body>
